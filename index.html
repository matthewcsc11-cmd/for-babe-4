<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💜 Surprise</title>

<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#050014;
  font-family:sans-serif;
}

/* CANVAS */
canvas{
  position:fixed;
  inset:0;
  z-index:1;
}

/* SCREENS */
.screen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#e6ddff;
  background:radial-gradient(circle at center,#2a145a,#050014);
  z-index:3;
}
.hidden{display:none}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:14px 30px;
  border-radius:30px;
  background:#6b4bff;
  color:#fff;
  cursor:pointer;
}

/* GIFT */
.gift{
  font-size:80px;
  animation:float 2s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

/* INPUT */
input{
  padding:12px 18px;
  border-radius:20px;
  border:none;
  font-size:18px;
  text-align:center;
}

/* FINAL TEXT */
#finalText{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:32px;
  line-height:1.4;
  color:#fff;
  background:transparent;
  opacity:0;
  transition:opacity 2s ease;
  z-index:4;
  pointer-events:none;
}
#finalText.show{opacity:1}
</style>
</head>

<body>

<canvas id="c"></canvas>

<!-- PAGE 1 -->
<div id="page1" class="screen">
  <div class="gift">🎁</div>
  <div class="btn">เปิดของขวัญ</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="screen hidden">
  <h2>🔐 ใส่รหัส</h2>
  <input id="pass" placeholder="••••">
  <div class="btn" id="passBtn">ยืนยัน</div>
</div>

<!-- FINAL TEXT -->
<div id="finalText">
💌 สุขสันต์วันครบรอบนะครับ<br>
เค้ารักเบบี๋มาก ๆ เลย<br>
ขอบคุณที่เข้ามาเป็นจักรวาลของเค้า 💜
</div>

<audio id="bgm" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
/* ===== BASIC ===== */
const canvas=c, ctx=canvas.getContext("2d");
function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize(); addEventListener("resize",resize);

/* ===== AUDIO ===== */
const audio=document.getElementById("bgm");
let audioCtx,analyser,dataArray;

/* ===== STATE ===== */
let phase="intro";
let climax=false;

/* ===== START AUDIO ===== */
function startAudio(){
  if(audioCtx) return;
  audio.muted=true; audio.play();
  audioCtx=new (AudioContext||webkitAudioContext)();
  const src=audioCtx.createMediaElementSource(audio);
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=256;
  dataArray=new Uint8Array(analyser.frequencyBinCount);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);
  audioCtx.resume().then(()=>{
    audio.muted=false;
    audio.play();
  });
}

/* ===== SCREENS ===== */
page1.onclick=()=>{
  startAudio();
  starBurst(innerWidth/2,innerHeight/2,200);
  setTimeout(()=>{
    page1.classList.add("hidden");
    page2.classList.remove("hidden");
  },800);
};

const PASSWORD="060225";
passBtn.onclick=()=>{
  if(pass.value===PASSWORD){
    page2.classList.add("hidden");
    phase="final";
  }else{
    pass.value="";
    alert("รหัสไม่ถูกต้อง");
  }
};

/* ===== SPACE ===== */
function drawSpace(){
  const g=ctx.createRadialGradient(
    canvas.width/2,canvas.height/2,0,
    canvas.width/2,canvas.height/2,canvas.width
  );
  g.addColorStop(0,"#1b0c3f");
  g.addColorStop(1,"#000");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* ===== STARS ===== */
const stars=[...Array(200)].map(()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*1.5+.3,
  t:Math.random()*Math.PI*2
}));
function drawStars(){
  stars.forEach(s=>{
    s.t+=.02;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r+Math.sin(s.t)*.6,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,.8)";
    ctx.fill();
  });
}

/* ===== HEARTS ===== */
function heart(t){
  return{
    x:16*Math.sin(t)**3,
    y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
  };
}
class FloatingHeart{
  constructor(){this.reset()}
  reset(){
    this.x=Math.random()*canvas.width;
    this.y=canvas.height+Math.random()*200;
    this.s=Math.random()*.3+.2;
    this.v=Math.random()*.6+.3;
    this.a=Math.random()*Math.PI*2;
  }
  update(b){
    this.y-=this.v+b*4;
    this.a+=.02;
    this.x+=Math.sin(this.a)*.6;
    if(this.y<-100) this.reset();
  }
  draw(b){
    ctx.beginPath();
    for(let t=0;t<=Math.PI*2;t+=.15){
      const p=heart(t);
      const x=this.x+p.x*this.s*(1+b);
      const y=this.y-p.y*this.s*(1+b);
      t?ctx.lineTo(x,y):ctx.moveTo(x,y);
    }
    ctx.strokeStyle="rgba(180,150,255,.9)";
    ctx.shadowBlur=25;
    ctx.shadowColor="#7a5cff";
    ctx.stroke();
  }
}
const hearts=[...Array(16)].map(()=>new FloatingHeart());

/* ===== PARTICLES ===== */
let particles=[];
function starBurst(x,y,n){
  for(let i=0;i<n;i++){
    particles.push({
      x,y,
      vx:(Math.random()-.5)*10,
      vy:(Math.random()-.5)*10,
      life:70
    });
  }
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle="rgba(200,170,255,.9)";
    ctx.fill();
    p.x+=p.vx; p.y+=p.vy; p.life--;
  });
  particles=particles.filter(p=>p.life>0);
}

/* ===== SONG EVENTS ===== */
audio.addEventListener("timeupdate",()=>{
  if(audio.currentTime>audio.duration*0.6) climax=true;
});

audio.addEventListener("ended",()=>{
  finalText.classList.add("show");
  starBurst(canvas.width/2,canvas.height/2,400);
});

/* ===== LOOP ===== */
function loop(){
  drawSpace();
  drawStars();

  let beat=0;
  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    beat=dataArray.reduce((a,b)=>a+b,0)/dataArray.length/255;
  }
  if(climax) beat*=1.8;

  hearts.forEach(h=>{h.update(beat);h.draw(beat)});
  drawParticles();

  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
