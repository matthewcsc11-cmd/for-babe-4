<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💜 Surprise</title>

<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#050014;
  font-family:sans-serif;
}
canvas{display:block}

/* screen */
.screen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#e6ddff;
  background:radial-gradient(circle at center,#2a145a,#050014);
  z-index:10;
}
.hidden{display:none}

/* button */
.btn{
  margin-top:30px;
  padding:14px 30px;
  border-radius:30px;
  background:#6b4bff;
  color:#fff;
  cursor:pointer;
}

/* gift */
.gift{
  font-size:80px;
  animation:float 2s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

/* input */
input{
  padding:12px 18px;
  border-radius:20px;
  border:none;
  font-size:18px;
  text-align:center;
}

/* final text */
#finalText{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:32px;
  line-height:1.4;
  color:#fff;
  background:rgba(0,0,0,.45);
  opacity:0;
  transition:opacity 2s;
  z-index:9;
}
#finalText.show{opacity:1}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="screen">
  <div class="gift">🎁</div>
  <div class="btn">เปิดของขวัญ</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="screen hidden">
  <h2>🔐 ใส่รหัส</h2>
  <input id="pass" placeholder="••••">
  <div class="btn" id="passBtn">ยืนยัน</div>
</div>

<!-- FINAL TEXT -->
<div id="finalText">
💌 สุขสันต์วันครบรอบนะครับ<br>
เค้ารักเบบี๋มาก ๆ เลย<br>
ขอบคุณที่เข้ามาเป็นจักรวาลของเค้า 💜
</div>

<canvas id="c"></canvas>

<audio id="bgm" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
/* ===== BASIC ===== */
const canvas=c, ctx=canvas.getContext("2d");
function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize(); addEventListener("resize",resize);

/* ===== AUDIO ===== */
const audio=document.getElementById("bgm");
let audioCtx,analyser,dataArray;

/* ===== STATE ===== */
let phase="intro";

/* ===== START AUDIO ===== */
function startAudio(){
  if(audioCtx) return;
  audio.muted=true; audio.play();
  audioCtx=new (AudioContext||webkitAudioContext)();
  const src=audioCtx.createMediaElementSource(audio);
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=256;
  dataArray=new Uint8Array(analyser.frequencyBinCount);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);
  audioCtx.resume().then(()=>{
    audio.muted=false;
    audio.play();
  });
}

/* ===== SCREENS ===== */
const page1=document.getElementById("page1");
const page2=document.getElementById("page2");
const finalText=document.getElementById("finalText");

page1.onclick=()=>{
  startAudio();
  starBurst(innerWidth/2,innerHeight/2,150);
  setTimeout(()=>{
    page1.classList.add("hidden");
    page2.classList.remove("hidden");
  },800);
};

const PASSWORD="060225";
passBtn.onclick=()=>{
  if(pass.value===PASSWORD){
    page2.classList.add("hidden");
    phase="final";
    drawN=0; done=false;
  }else{
    pass.value="";
    alert("รหัสไม่ถูกต้อง");
  }
};

/* ===== SPACE ===== */
function drawSpace(){
  const g=ctx.createRadialGradient(
    canvas.width/2,canvas.height/2,0,
    canvas.width/2,canvas.height/2,canvas.width
  );
  g.addColorStop(0,"#1b0c3f");
  g.addColorStop(1,"#000");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* ===== STARS ===== */
const stars=[...Array(180)].map(()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*1.5+.3,
  t:Math.random()*Math.PI*2
}));
function drawStars(){
  stars.forEach(s=>{
    s.t+=.02;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r+Math.sin(s.t)*.4,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,.8)";
    ctx.fill();
  });
}

/* ===== HEART ===== */
function heart(t){
  return{
    x:16*Math.sin(t)**3,
    y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
  };
}
class FloatingHeart{
  constructor(){this.reset()}
  reset(){
    this.x=Math.random()*canvas.width;
    this.y=canvas.height+Math.random()*200;
    this.s=Math.random()*.25+.2;
    this.v=Math.random()*.5+.2;
    this.a=Math.random()*Math.PI*2;
  }
  update(b){
    this.y-=this.v+b*2;
    this.a+=.02;
    this.x+=Math.sin(this.a)*.4;
    if(this.y<-80) this.reset();
  }
  draw(b){
    ctx.beginPath();
    for(let t=0;t<=Math.PI*2;t+=.12){
      const p=heart(t);
      const x=this.x+p.x*this.s*(1+b*.4);
      const y=this.y-p.y*this.s*(1+b*.4);
      t?ctx.lineTo(x,y):ctx.moveTo(x,y);
    }
    ctx.strokeStyle="rgba(160,130,255,.9)";
    ctx.shadowBlur=20;
    ctx.shadowColor="#6b4bff";
    ctx.stroke();
  }
}
const hearts=[...Array(14)].map(()=>new FloatingHeart());

/* ===== PARTICLES ===== */
let particles=[];
function starBurst(x,y,n){
  for(let i=0;i<n;i++){
    particles.push({
      x,y,
      vx:(Math.random()-.5)*8,
      vy:(Math.random()-.5)*8,
      life:60
    });
  }
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle="rgba(180,150,255,.9)";
    ctx.fill();
    p.x+=p.vx; p.y+=p.vy; p.life--;
  });
  particles=particles.filter(p=>p.life>0);
}

/* ===== IMAGE DRAW ===== */
const img=new Image();
img.src="final.png";
let imgPts=[],drawN=0,done=false;

img.onload=()=>{
  for(let y=0;y<img.height;y+=6){
    for(let x=0;x<img.width;x+=6){
      imgPts.push({x,y});
    }
  }
};

function drawImageLine(){
  if(!img.complete||done) return;
  const scale=Math.min(
    canvas.width/img.width,
    canvas.height/img.height
  )*.5;
  const ox=canvas.width/2-(img.width*scale)/2;
  const oy=canvas.height/2-(img.height*scale)/2;

  ctx.strokeStyle="rgba(190,160,255,.9)";
  ctx.lineWidth=2;
  ctx.shadowBlur=20;
  ctx.shadowColor="#7a5cff";
  ctx.beginPath();

  for(let i=0;i<40 && drawN<imgPts.length;i++,drawN++){
    const p=imgPts[drawN];
    const x=ox+p.x*scale;
    const y=oy+p.y*scale;
    drawN===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
  if(drawN>=imgPts.length) done=true;
}

/* ===== SONG END ===== */
audio.addEventListener("ended",()=>{
  finalText.classList.add("show");
  starBurst(canvas.width/2,canvas.height/2,300);
});

/* ===== LOOP ===== */
function loop(){
  drawSpace(); drawStars();

  let beat=0;
  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    beat=dataArray.reduce((a,b)=>a+b,0)/dataArray.length/255;
  }

  hearts.forEach(h=>{h.update(beat);h.draw(beat)});
  drawParticles();

  if(phase==="final") drawImageLine();

  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
