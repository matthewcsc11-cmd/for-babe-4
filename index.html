<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 Surprise</title>

<style>
html,body{
  margin:0;
  padding:0;
  background:#050014;
  overflow:hidden;
  font-family:sans-serif;
}
canvas{
  position:fixed;
  inset:0;
  z-index:1;
}
.screen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle,#2a145a,#050014);
  color:#fff;
  z-index:3;
}
.hidden{display:none}
.btn{
  margin-top:30px;
  padding:14px 34px;
  border-radius:40px;
  background:#6b4bff;
  color:#fff;
  font-size:18px;
}
.gift{
  font-size:80px;
  animation:float 2s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-16px)}
}
input{
  padding:12px 18px;
  border-radius:20px;
  border:none;
  font-size:18px;
  text-align:center;
}
#finalText{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:30px;
  line-height:1.5;
  opacity:0;
  transition:opacity 2s;
  z-index:4;
  pointer-events:none;
}
#finalText.show{opacity:1}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="page1" class="screen">
  <div class="gift">🎁</div>
  <div class="btn">เปิดของขวัญ</div>
</div>

<div id="page2" class="screen hidden">
  <h2>🔐 ใส่รหัส</h2>
  <input id="pass" placeholder="••••">
  <div class="btn" id="passBtn">ยืนยัน</div>
</div>

<div id="finalText">
💌 สุขสันต์วันครบรอบนะครับ<br>
ขอบคุณที่เป็นจักรวาลของเค้า 💜
</div>

<audio id="bgm" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
/* ===== SAFE DOM ===== */
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
const page1=document.getElementById("page1");
const page2=document.getElementById("page2");
const pass=document.getElementById("pass");
const passBtn=document.getElementById("passBtn");
const finalText=document.getElementById("finalText");
const audio=document.getElementById("bgm");

/* ===== RESIZE ===== */
function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize(); addEventListener("resize",resize);

/* ===== AUDIO (iOS SAFE) ===== */
let audioCtx, analyser, dataArray;
function startAudio(){
  if(audioCtx) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=256;
  dataArray=new Uint8Array(analyser.frequencyBinCount);
  const src=audioCtx.createMediaElementSource(audio);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);
  audio.play();
}

/* ===== UI FLOW ===== */
page1.onclick=()=>{
  startAudio();
  page1.classList.add("hidden");
  page2.classList.remove("hidden");
};

passBtn.onclick=()=>{
  if(pass.value==="060225"){
    page2.classList.add("hidden");
  }else{
    alert("รหัสไม่ถูกต้อง");
  }
};

/* ===== BACKGROUND ===== */
function drawSpace(){
  const g=ctx.createRadialGradient(
    canvas.width/2,canvas.height/2,0,
    canvas.width/2,canvas.height/2,canvas.width
  );
  g.addColorStop(0,"#1b0c3f");
  g.addColorStop(1,"#000");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* ===== STARS ===== */
const stars=[...Array(200)].map(()=>({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  r:Math.random()*1.5+.3,
  t:Math.random()*6
}));
function drawStars(){
  stars.forEach(s=>{
    s.t+=.02;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r+Math.sin(s.t)*.6,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,.9)";
    ctx.fill();
  });
}

/* ===== HEART ===== */
function heart(t){
  return{
    x:16*Math.sin(t)**3,
    y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
  };
}
class FloatingHeart{
  constructor(){this.reset()}
  reset(){
    this.x=Math.random()*canvas.width;
    this.y=canvas.height+100;
    this.s=Math.random()*.4+.3;
    this.v=Math.random()*.6+.4;
    this.a=Math.random()*6;
  }
  update(b){
    this.y-=this.v+b*4;
    this.a+=.03;
    this.x+=Math.sin(this.a)*.6;
    if(this.y<-100) this.reset();
  }
  draw(b){
    ctx.beginPath();
    for(let t=0;t<=Math.PI*2;t+=.2){
      const p=heart(t);
      const x=this.x+p.x*this.s*(1+b);
      const y=this.y-p.y*this.s*(1+b);
      t?ctx.lineTo(x,y):ctx.moveTo(x,y);
    }
    ctx.strokeStyle="rgba(200,170,255,1)";
    ctx.lineWidth=2.5;
    ctx.shadowBlur=20;
    ctx.shadowColor="#7a5cff";
    ctx.stroke();
  }
}
const hearts=[...Array(16)].map(()=>new FloatingHeart());

/* ===== LOOP ===== */
function loop(){
  drawSpace();
  drawStars();

  let beat=0;
  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    beat=dataArray.reduce((a,b)=>a+b,0)/dataArray.length/255;
  }

  hearts.forEach(h=>{h.update(beat);h.draw(beat)});
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
