<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 Surprise</title>

<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:black;
  touch-action:manipulation;
}
canvas{display:block}

/* cover */
#cover{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#2a145a,#000);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#e0d9ff;
  font-family:sans-serif;
  z-index:10;
}
#cover h1{font-size:26px}
#cover .btn{
  margin-top:30px;
  padding:14px 28px;
  border-radius:30px;
  background:#6b4bff;
  color:white;
}

/* final text */
#finalText{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:32px;
  line-height:1.5;
  color:white;
  background:rgba(0,0,0,.45);
  opacity:0;
  transition:opacity 2s;
  z-index:9;
}
#finalText.show{opacity:1}
</style>
</head>

<body>

<div id="cover">
  <h1>💜</h1>
  <h1>กดสิ</h1>
  <div class="btn">✨</div>
</div>

<div id="finalText">
💌 สุขสันต์วันครบรอบนะครับ<br>
เค้ารักเบบี๋มาก ๆ เลย<br>
ขอบคุณที่เข้ามาเป็นจักรวาลของเค้า 💜
</div>

<canvas id="c"></canvas>

<audio id="bgm" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
/* ===== BASIC ===== */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const audio = document.getElementById("bgm");
const cover = document.getElementById("cover");
const finalText = document.getElementById("finalText");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

/* ===== AUDIO (iOS SAFE) ===== */
let audioCtx, analyser, dataArray, started = false;

function start(){
  if(started) return;
  started = true;

  const AC = window.AudioContext || window.webkitAudioContext;
  audioCtx = new AC();

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  dataArray = new Uint8Array(analyser.frequencyBinCount);

  const src = audioCtx.createMediaElementSource(audio);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);

  audio.muted = true;
  audio.play();

  audioCtx.resume().then(()=>{
    audio.muted = false;
    audio.play();
  });

  cover.style.display = "none";
  burst(innerWidth/2, innerHeight/2);
}

cover.addEventListener("click", start, {once:true});
cover.addEventListener("touchstart", e=>{
  e.preventDefault();
  start();
},{once:true, passive:false});

/* ===== SPACE ===== */
function drawSpace(){
  ctx.shadowBlur = 0;
  const g = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, 0,
    canvas.width/2, canvas.height/2, canvas.width
  );
  g.addColorStop(0,"#1b0c3f");
  g.addColorStop(.5,"#06001a");
  g.addColorStop(1,"#000");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* ===== STARS ===== */
const stars=[...Array(160)].map(()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*1.4+.4,
  t:Math.random()*Math.PI*2
}));
function drawStars(){
  stars.forEach(s=>{
    s.t+=.02;
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r+Math.sin(s.t)*.4,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,.8)";
    ctx.fill();
  });
}

/* ===== METEOR ===== */
let meteors=[];
setInterval(()=>meteors.push({
  x:Math.random()*canvas.width,
  y:-50,
  vx:Math.random()*6+8,
  vy:Math.random()*6+10,
  life:70
}),3000);

function drawMeteors(){
  meteors.forEach(m=>{
    ctx.beginPath();
    ctx.moveTo(m.x,m.y);
    ctx.lineTo(m.x-m.vx*5,m.y-m.vy*5);
    ctx.strokeStyle="rgba(200,200,255,.8)";
    ctx.lineWidth=2;
    ctx.shadowBlur=20;
    ctx.shadowColor="#bbaaff";
    ctx.stroke();
    m.x+=m.vx; m.y+=m.vy; m.life--;
  });
  meteors = meteors.filter(m=>m.life>0);
}

/* ===== HEART ===== */
function heart(t){
  return{
    x:16*Math.sin(t)**3,
    y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
  };
}
class FloatingHeart{
  constructor(){this.reset()}
  reset(){
    this.x=Math.random()*canvas.width;
    this.y=canvas.height+Math.random()*200;
    this.s=Math.random()*.25+.2;
    this.v=Math.random()*.4+.2;
    this.a=Math.random()*Math.PI*2;
  }
  update(b){
    this.y-=this.v+b*2;
    this.a+=.02;
    this.x+=Math.sin(this.a)*.4;
    if(this.y<-80) this.reset();
  }
  draw(b){
    ctx.beginPath();
    for(let t=0;t<=Math.PI*2;t+=.12){
      const p=heart(t);
      const x=this.x+p.x*this.s*(1+b*.3);
      const y=this.y-p.y*this.s*(1+b*.3);
      t?ctx.lineTo(x,y):ctx.moveTo(x,y);
    }
    ctx.strokeStyle="rgba(160,130,255,.9)";
    ctx.shadowBlur=18;
    ctx.shadowColor="#5b3bff";
    ctx.stroke();
  }
}
const hearts=[...Array(14)].map(()=>new FloatingHeart());

/* ===== PARTICLES ===== */
let particles=[];
function burst(x,y){
  for(let i=0;i<40;i++){
    particles.push({
      x,y,
      vx:(Math.random()-.5)*8,
      vy:(Math.random()-.5)*8,
      life:80
    });
  }
}
canvas.addEventListener("click",e=>burst(e.clientX,e.clientY));
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  const t=e.touches[0];
  burst(t.clientX,t.clientY);
},{passive:false});

function drawParticles(){
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fillStyle="rgba(180,150,255,.9)";
    ctx.shadowBlur=20;
    ctx.shadowColor="#7a5cff";
    ctx.fill();
    p.x+=p.vx; p.y+=p.vy; p.life--;
  });
  particles = particles.filter(p=>p.life>0);
}

/* ===== FINAL IMAGE ===== */
const img=new Image();
img.src="final.png";
let pts=[],drawN=0,showImage=false;

img.onload=()=>{
  for(let y=0;y<img.height;y+=6)
    for(let x=0;x<img.width;x+=6)
      pts.push({x,y});
};

function drawImage(){
  if(!showImage || drawN>=pts.length) return;

  const scale=Math.min(canvas.width/img.width,canvas.height/img.height)*.55;
  const ox=canvas.width/2-(img.width*scale)/2;
  const oy=canvas.height/2-(img.height*scale)/2;

  ctx.strokeStyle="rgba(200,170,255,.95)";
  ctx.lineWidth=2;
  ctx.shadowBlur=25;
  ctx.shadowColor="#9b7bff";
  ctx.beginPath();

  for(let i=0;i<40 && drawN<pts.length;i++,drawN++){
    const p=pts[drawN];
    const x=ox+p.x*scale;
    const y=oy+p.y*scale;
    drawN?ctx.lineTo(x,y):ctx.moveTo(x,y);
  }
  ctx.stroke();
}

/* ===== SONG END ===== */
audio.addEventListener("ended",()=>{
  showImage=true;
  finalText.classList.add("show");
  burst(canvas.width/2,canvas.height/2);
});

/* ===== LOOP ===== */
function loop(){
  drawSpace();
  drawStars();
  drawMeteors();

  let beat=0;
  if(analyser){
    analyser.getByteFrequencyData(dataArray);
    beat=dataArray.reduce((a,b)=>a+b,0)/dataArray.length/255;
  }

  hearts.forEach(h=>{h.update(beat);h.draw(beat)});
  drawParticles();
  drawImage();

  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
