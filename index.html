<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>💜 Surprise</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #050014;
      font-family: sans-serif;
    }

    canvas {
      display: block
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #e6ddff;
      background: radial-gradient(circle at center, #2a145a, #050014);
      z-index: 10;
    }

    .hidden {
      display: none
    }

    .btn {
      margin-top: 30px;
      padding: 14px 30px;
      border-radius: 30px;
      background: #6b4bff;
      color: white;
      cursor: pointer;
    }

    .gift {
      font-size: 80px;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-15px)
      }
    }

    input {
      padding: 12px 18px;
      border-radius: 20px;
      border: none;
      outline: none;
      font-size: 18px;
      text-align: center;
    }

    #finalText {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 30px;
      color: #fff;
      background: rgba(0, 0, 0, .45);
      opacity: 0;
      transition: opacity 2s;
      z-index: 9;
    }

    #finalText.show {
      opacity: 1
    }
  </style>
</head>

<body>

  <div id="page1" class="screen">
    <div class="gift">🎁</div>
    <div class="btn">เปิดของขวัญ</div>
  </div>

  <div id="page2" class="screen hidden">
    <h2>🔐 ใส่รหัส</h2>
    <input id="pass" placeholder="••••">
    <div class="btn" id="passBtn">ยืนยัน</div>
  </div>

  <div id="finalText">
    💌 สุขสันต์วันครบรอบนะครับ<br>
    เค้ารักเบบี๋มาก ๆ เลย<br>
    ขอบคุณที่เข้ามาอยู่ในจักรวาลของเค้า 💜
  </div>

  <canvas id="c"></canvas>

  <audio id="bgm" preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    /* BASIC */
    const canvas = c, ctx = canvas.getContext("2d");
    function resize() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
    }
    resize(); addEventListener("resize", resize);

    /* AUDIO */
    const audio = document.getElementById("bgm");
    let audioCtx, analyser, dataArray;
    function startAudio() {
      if (audioCtx) return;
      audio.muted = true; audio.play();
      audioCtx = new (AudioContext || webkitAudioContext)();
      const src = audioCtx.createMediaElementSource(audio);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      src.connect(analyser);
      analyser.connect(audioCtx.destination);
      audioCtx.resume().then(() => {
        audio.muted = false; audio.play();
      });
    }

    /* SCREENS */
    page1.onclick = () => {
      startAudio();
      starBurst(innerWidth / 2, innerHeight / 2, 120);
      setTimeout(() => {
        page1.classList.add("hidden");
        page2.classList.remove("hidden");
      }, 800);
    };

    const PASSWORD = "060225";
    passBtn.onclick = () => {
      if (pass.value === PASSWORD) {
        page2.classList.add("hidden");
        startDrawImage = true;
      } else {
        pass.value = "";
        alert("รหัสไม่ถูกต้อง");
      }
    };

    /* BACKGROUND */
    function drawSpace() {
      const g = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, 0,
        canvas.width / 2, canvas.height / 2, canvas.width
      );
      g.addColorStop(0, "#1b0c3f");
      g.addColorStop(1, "#000");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    /* STARS */
    const stars = [...Array(180)].map(() => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.5 + .3,
      t: Math.random() * Math.PI * 2
    }));
    function drawStars() {
      stars.forEach(s => {
        s.t += .02;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r + Math.sin(s.t) * .4, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,.8)";
        ctx.fill();
      });
    }

    /* HEARTS */
    function heart(t) {
      return {
        x: 16 * Math.sin(t) ** 3,
        y: 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)
      };
    }
    class FloatingHeart {
      constructor() { this.reset() }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height + Math.random() * 200;
        this.s = Math.random() * .25 + .2;
        this.v = Math.random() * .5 + .2;
        this.a = Math.random() * Math.PI * 2;
      }
      update(b) {
        this.y -= this.v + b * 2;
        this.a += .02;
        this.x += Math.sin(this.a) * .4;
        if (this.y < -80) this.reset();
      }
      draw(b) {
        ctx.beginPath();
        for (let t = 0; t <= Math.PI * 2; t += .12) {
          const p = heart(t);
          const x = this.x + p.x * this.s * (1 + b * .4);
          const y = this.y - p.y * this.s * (1 + b * .4);
          t ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
        }
        ctx.strokeStyle = "rgba(160,130,255,.9)";
        ctx.shadowBlur = 20;
        ctx.shadowColor = "#6b4bff";
        ctx.stroke();
      }
    }
    const hearts = [...Array(14)].map(() => new FloatingHeart());

    /* PARTICLES */
    let particles = [];
    function starBurst(x, y, n) {
      for (let i = 0; i < n; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - .5) * 8,
          vy: (Math.random() - .5) * 8,
          life: 80
        });
      }
    }
    function drawParticles() {
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(190,160,255,.9)";
        ctx.fill();
        p.x += p.vx; p.y += p.vy; p.life--;
      });
      particles = particles.filter(p => p.life > 0);
    }

    /* IMAGE DRAW */
    const img = new Image();
    img.src = "final.png";
    let imgPts = [], drawIndex = 0, startDrawImage = false;

    img.onload = () => {
      const scale = .5;
      const ox = canvas.width / 2 - img.width * scale / 2;
      const oy = canvas.height / 2 - img.height * scale / 2;
      for (let y = 0; y < img.height; y += 6) {
        for (let x = 0; x < img.width; x += 6) {
          imgPts.push({ x: ox + x * scale, y: oy + y * scale });
        }
      }
    };

    /* MUSIC END → TEXT */
    audio.addEventListener("ended", () => {
      finalText.classList.add("show");
      starBurst(canvas.width / 2, canvas.height / 2, 220);
    });

    /* LOOP */
    function loop() {
      drawSpace();
      drawStars();

      let beat = 0;
      if (analyser) {
        analyser.getByteFrequencyData(dataArray);
        beat = dataArray.reduce((a, b) => a + b, 0) / dataArray.length / 255;
      }

      hearts.forEach(h => { h.update(beat); h.draw(beat) });
      drawParticles();

      if (startDrawImage) {
        for (let i = 0; i < 120; i++) {
          const p = imgPts[drawIndex++];
          if (!p) break;
          ctx.fillStyle = "rgba(200,170,255,.9)";
          ctx.fillRect(p.x, p.y, 2, 2);
        }
      }

      requestAnimationFrame(loop);
    }
    loop();
  </script>

</body>

</html>
